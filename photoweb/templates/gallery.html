<!DOCTYPE html>
<html>
<head>
  <title>{{page_title}}</title>
  <link rel="stylesheet" href="style.css" type="text/css">
  <meta name="viewport" content="initial-scale=1.0">
</head>
<body>
  <div class='info'>
      <h1>{{page_title}}</h1>
      {% for desc in page_desc %}
        <p class="caption">{{desc.p}}</p>
      {% endfor %}
  </div>
  <div class="gallery">
  {% for row in pic_rows %}
  <div class="row">
  {% for pic in row.pics %}
  <div class="cell">
  <div class='pic' id="{{pic.num}}" style="width: {{pic.th_w}}px">
    <a href="{{pic.detail_path}}">
        <img src='thumbnails/{{pic.img_path}}' width='{{pic.th_w}}' height='{{pic.th_h}}'>
    </a>
    <p class="small num">{{pic.num}}</p>
    {% if pic.title %}<h3>{{pic.title}}</h3>{% endif %}
  </div>
  </div>
  {% endfor %}
  </div>
  {% endfor %}
  </div>
</body>
</html>
